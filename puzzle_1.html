<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Пазлы от Егора</title>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    background: #0d0d1a;
    color: #e0e0f0;
    font-family: 'Segoe UI', sans-serif;
    min-height: 100vh;
    display: flex;
    flex-direction: column;
    align-items: center;
    padding: 24px 16px;
  }
  h1 {
    font-size: 28px;
    font-weight: 700;
    letter-spacing: 2px;
    color: #a78bfa;
    margin-bottom: 20px;
    text-transform: uppercase;
    text-shadow: 0 0 20px rgba(167,139,250,0.4);
  }
  #controls {
    display: flex;
    gap: 10px;
    flex-wrap: wrap;
    justify-content: center;
    margin-bottom: 18px;
  }
  select, button {
    background: #1e1e35;
    color: #e0e0f0;
    border: 1.5px solid #3a3a6a;
    border-radius: 8px;
    padding: 8px 16px;
    font-size: 14px;
    cursor: pointer;
    outline: none;
    transition: border-color 0.2s, background 0.2s;
  }
  select:hover, button:hover { border-color: #a78bfa; background: #252545; }
  button#newgame {
    background: #4c1d95;
    border-color: #7c3aed;
    color: #fff;
    font-weight: 600;
    letter-spacing: 1px;
  }
  button#newgame:hover { background: #5b21b6; }
  #status-row {
    display: flex;
    gap: 24px;
    margin-bottom: 14px;
    font-size: 14px;
    color: #9090b0;
  }
  #status-row span { color: #a78bfa; font-weight: 600; }
  #board-wrap {
    position: relative;
    border-radius: 12px;
    overflow: hidden;
    box-shadow: 0 0 40px rgba(124,58,237,0.25);
  }
  #board {
    position: relative;
    display: block;
    background: #111;
  }
  .piece {
    position: absolute;
    cursor: grab;
    border: 1px solid rgba(255,255,255,0.08);
    box-sizing: border-box;
    transition: box-shadow 0.12s;
    user-select: none;
  }
  .piece:hover { box-shadow: 0 0 0 2px #a78bfa; z-index: 10; }
  .piece.dragging { cursor: grabbing; z-index: 999; box-shadow: 0 8px 32px rgba(0,0,0,0.5), 0 0 0 2px #7c3aed; opacity: 0.92; }
  .piece.correct { border-color: #10b981; box-shadow: 0 0 0 2px #10b981; }
  #win-msg {
    display: none;
    margin-top: 18px;
    font-size: 22px;
    font-weight: 700;
    color: #10b981;
    text-align: center;
    text-shadow: 0 0 20px rgba(16,185,129,0.5);
    animation: pulse 1s infinite alternate;
  }
  @keyframes pulse { from { opacity: 1; } to { opacity: 0.6; } }
  #preview-btn {
    background: #1e2a1e;
    border-color: #10b981;
    color: #10b981;
    font-size: 13px;
    padding: 6px 14px;
  }
  #preview-btn:hover { background: #1a3a2a; }
  #preview-overlay {
    display: none;
    position: fixed;
    top: 0; left: 0; right: 0; bottom: 0;
    background: rgba(0,0,0,0.75);
    z-index: 9999;
    align-items: center;
    justify-content: center;
    flex-direction: column;
    gap: 12px;
  }
  #preview-overlay.active { display: flex; }
  #preview-overlay canvas { border-radius: 8px; box-shadow: 0 0 40px rgba(0,0,0,0.8); max-width: 90vw; max-height: 80vh; }
  #preview-overlay p { color: #9090b0; font-size: 14px; }
  canvas#srcCanvas { display: none; }
  #moves-count { font-size: 14px; color: #9090b0; }
  #moves-count span { color: #f59e0b; font-weight: 600; }
</style>
</head>
<body>
<h1>🧩 Пазлы от Егора</h1>

<div id="controls">
  <select id="difficulty">
    <option value="6">6×6 — тяжело</option>
    <option value="8" selected>8×8 — очень тяжело</option>
    <option value="10">10×10 — безумие</option>
  </select>
  <select id="imgSelect">
    <option value="space">Космос</option>
    <option value="ocean">Океан</option>
    <option value="forest">Лес</option>
    <option value="city">Город</option>
    <option value="volcano">Вулкан</option>
  </select>
  <button id="preview-btn" onclick="showPreview()">Посмотреть картинку</button>
  <button id="newgame" onclick="startPuzzle()">Новая игра</button>
</div>

<div id="status-row">
  <div id="moves-count">Ходов: <span id="mv">0</span></div>
  <div>На месте: <span id="correct-count">0</span> / <span id="total-count">0</span></div>
</div>

<div id="board-wrap">
  <div id="board"></div>
</div>

<div id="win-msg">🎉 Собрал! Ты крутой! 🎉<br><span style="font-size:15px;color:#9090b0;">Ходов потрачено: <span id="final-mv"></span></span></div>

<div id="preview-overlay" onclick="hidePreview()">
  <canvas id="previewCanvas"></canvas>
  <p>Нажми, чтобы закрыть</p>
</div>

<canvas id="srcCanvas"></canvas>

<script>
const BOARD_SIZE = 480;
let N = 8, pieces = [], dragging = null, offX, offY, moves = 0;

const DRAWS = {
  space: drawSpace,
  ocean: drawOcean,
  forest: drawForest,
  city: drawCity,
  volcano: drawVolcano
};

function drawSpace(ctx, w, h) {
  const gr = ctx.createLinearGradient(0,0,0,h);
  gr.addColorStop(0,'#000010'); gr.addColorStop(1,'#0a0028');
  ctx.fillStyle=gr; ctx.fillRect(0,0,w,h);
  for(let i=0;i<200;i++){
    const x=Math.random()*w, y=Math.random()*h, r=Math.random()<0.1?1.5:0.7;
    ctx.fillStyle=`rgba(255,255,${Math.floor(180+Math.random()*75)},${0.5+Math.random()*0.5})`;
    ctx.beginPath(); ctx.arc(x,y,r,0,Math.PI*2); ctx.fill();
  }
  // nebula
  const nb = ctx.createRadialGradient(w*0.3,h*0.4,10,w*0.3,h*0.4,w*0.25);
  nb.addColorStop(0,'rgba(100,0,180,0.4)'); nb.addColorStop(1,'rgba(0,0,80,0)');
  ctx.fillStyle=nb; ctx.fillRect(0,0,w,h);
  // planet
  const pg = ctx.createRadialGradient(w*0.65,h*0.35,5,w*0.65,h*0.35,w*0.18);
  pg.addColorStop(0,'#ff9944'); pg.addColorStop(0.5,'#cc4400'); pg.addColorStop(1,'#220000');
  ctx.fillStyle=pg; ctx.beginPath(); ctx.arc(w*0.65,h*0.35,w*0.18,0,Math.PI*2); ctx.fill();
  // rings
  ctx.save(); ctx.translate(w*0.65,h*0.35); ctx.scale(1,0.25);
  ctx.strokeStyle='rgba(200,150,80,0.5)'; ctx.lineWidth=8;
  ctx.beginPath(); ctx.arc(0,0,w*0.26,0,Math.PI*2); ctx.stroke();
  ctx.strokeStyle='rgba(200,150,80,0.3)'; ctx.lineWidth=14;
  ctx.beginPath(); ctx.arc(0,0,w*0.32,0,Math.PI*2); ctx.stroke();
  ctx.restore();
  // moon
  ctx.fillStyle='#bbb'; ctx.beginPath(); ctx.arc(w*0.2,h*0.7,w*0.06,0,Math.PI*2); ctx.fill();
  ctx.fillStyle='rgba(0,0,30,0.4)'; ctx.beginPath(); ctx.arc(w*0.22,h*0.69,w*0.05,0,Math.PI*2); ctx.fill();
  // comet
  ctx.save(); ctx.translate(w*0.1,h*0.15);
  const cg=ctx.createLinearGradient(0,0,w*0.3,w*0.1);
  cg.addColorStop(0,'rgba(255,255,255,0)'); cg.addColorStop(1,'rgba(200,220,255,0.8)');
  ctx.fillStyle=cg; ctx.beginPath(); ctx.moveTo(w*0.3,w*0.1); ctx.lineTo(0,0); ctx.lineTo(w*0.3,-w*0.1); ctx.closePath(); ctx.fill();
  ctx.fillStyle='#fff'; ctx.beginPath(); ctx.arc(w*0.3,0,3,0,Math.PI*2); ctx.fill();
  ctx.restore();
}

function drawOcean(ctx, w, h) {
  const sky = ctx.createLinearGradient(0,0,0,h*0.45);
  sky.addColorStop(0,'#1a3a6a'); sky.addColorStop(1,'#4a90d9');
  ctx.fillStyle=sky; ctx.fillRect(0,0,w,h*0.45);
  // sun
  const sg=ctx.createRadialGradient(w*0.75,h*0.12,2,w*0.75,h*0.12,w*0.1);
  sg.addColorStop(0,'#fffde7'); sg.addColorStop(0.4,'#ffd54f'); sg.addColorStop(1,'rgba(255,213,79,0)');
  ctx.fillStyle=sg; ctx.fillRect(0,0,w,h*0.45);
  // clouds
  ctx.fillStyle='rgba(255,255,255,0.7)';
  [[w*0.1,h*0.08,55,22],[w*0.4,h*0.05,70,25],[w*0.7,h*0.1,60,20]].forEach(([x,y,rx,ry])=>{
    ctx.beginPath(); ctx.ellipse(x,y,rx,ry,0,0,Math.PI*2); ctx.fill();
    ctx.beginPath(); ctx.ellipse(x-rx*0.4,y+ry*0.3,rx*0.6,ry*0.7,0,0,Math.PI*2); ctx.fill();
    ctx.beginPath(); ctx.ellipse(x+rx*0.4,y+ry*0.2,rx*0.5,ry*0.6,0,0,Math.PI*2); ctx.fill();
  });
  // water
  const wg=ctx.createLinearGradient(0,h*0.45,0,h);
  wg.addColorStop(0,'#1565c0'); wg.addColorStop(0.5,'#0d47a1'); wg.addColorStop(1,'#001a4a');
  ctx.fillStyle=wg; ctx.fillRect(0,h*0.45,w,h*0.55);
  // sun reflection
  const rg=ctx.createLinearGradient(w*0.6,h*0.45,w*0.75,h);
  rg.addColorStop(0,'rgba(255,213,79,0.5)'); rg.addColorStop(1,'rgba(255,213,79,0)');
  ctx.fillStyle=rg;
  ctx.beginPath(); ctx.moveTo(w*0.65,h*0.45); ctx.lineTo(w*0.85,h*0.45); ctx.lineTo(w,h); ctx.lineTo(w*0.5,h); ctx.closePath(); ctx.fill();
  // waves
  for(let i=0;i<8;i++){
    ctx.strokeStyle=`rgba(100,180,255,${0.1+i*0.03})`; ctx.lineWidth=2;
    const y=h*0.48+i*(h*0.06);
    ctx.beginPath(); ctx.moveTo(0,y);
    for(let x=0;x<=w;x+=30) ctx.quadraticCurveTo(x+15,y-8+i*2,x+30,y);
    ctx.stroke();
  }
  // island
  ctx.fillStyle='#1b5e20'; ctx.beginPath(); ctx.ellipse(w*0.2,h*0.48,w*0.1,h*0.04,0,0,Math.PI*2); ctx.fill();
  ctx.fillStyle='#c8a96e'; ctx.beginPath(); ctx.ellipse(w*0.2,h*0.47,w*0.07,h*0.025,-0.1,0,Math.PI*2); ctx.fill();
  ctx.strokeStyle='#5d4037'; ctx.lineWidth=3; ctx.beginPath(); ctx.moveTo(w*0.2,h*0.47); ctx.lineTo(w*0.2,h*0.3); ctx.stroke();
  ctx.fillStyle='#2e7d32'; ctx.beginPath(); ctx.moveTo(w*0.2,h*0.3); ctx.lineTo(w*0.12,h*0.42); ctx.lineTo(w*0.28,h*0.42); ctx.closePath(); ctx.fill();
}

function drawForest(ctx, w, h) {
  const sky=ctx.createLinearGradient(0,0,0,h*0.5);
  sky.addColorStop(0,'#ff6b35'); sky.addColorStop(0.5,'#f7931e'); sky.addColorStop(1,'#ffcd3c');
  ctx.fillStyle=sky; ctx.fillRect(0,0,w,h*0.5);
  // sun
  const sg=ctx.createRadialGradient(w*0.5,h*0.5,5,w*0.5,h*0.5,w*0.15);
  sg.addColorStop(0,'rgba(255,255,200,0.9)'); sg.addColorStop(1,'rgba(255,200,50,0)');
  ctx.fillStyle=sg; ctx.fillRect(0,0,w,h*0.5);
  ctx.fillStyle='rgba(255,255,200,0.95)'; ctx.beginPath(); ctx.arc(w*0.5,h*0.5,w*0.04,0,Math.PI*2); ctx.fill();
  // ground
  const gg=ctx.createLinearGradient(0,h*0.5,0,h);
  gg.addColorStop(0,'#1b3a0a'); gg.addColorStop(1,'#0d1f05');
  ctx.fillStyle=gg; ctx.fillRect(0,h*0.5,w,h*0.5);
  // trees silhouette
  const treeColor='rgba(10,30,5,0.95)';
  function tree(x,baseY,sw,sh){
    ctx.fillStyle=treeColor;
    ctx.beginPath(); ctx.moveTo(x,baseY-sh); ctx.lineTo(x-sw,baseY); ctx.lineTo(x+sw,baseY); ctx.closePath(); ctx.fill();
    ctx.beginPath(); ctx.moveTo(x,baseY-sh*1.3); ctx.lineTo(x-sw*0.8,baseY-sh*0.4); ctx.lineTo(x+sw*0.8,baseY-sh*0.4); ctx.closePath(); ctx.fill();
    ctx.beginPath(); ctx.moveTo(x,baseY-sh*1.6); ctx.lineTo(x-sw*0.5,baseY-sh*0.9); ctx.lineTo(x+sw*0.5,baseY-sh*0.9); ctx.closePath(); ctx.fill();
    ctx.fillRect(x-sw*0.15,baseY,sw*0.3,h*0.08);
  }
  const baseY=h*0.5;
  [0.05,0.15,0.25,0.82,0.92,1.0].forEach(p=>tree(w*p,baseY,w*0.055,h*0.35));
  [0.35,0.45,0.55,0.65,0.72].forEach(p=>tree(w*p,baseY,w*0.065,h*0.42));
  // foreground trees (bigger)
  [0,0.3,0.7,1].forEach(p=>tree(w*p,baseY+h*0.05,w*0.08,h*0.5));
}

function drawCity(ctx, w, h) {
  const sky=ctx.createLinearGradient(0,0,0,h*0.7);
  sky.addColorStop(0,'#0f0c1a'); sky.addColorStop(0.6,'#1a1035'); sky.addColorStop(1,'#2d1b4e');
  ctx.fillStyle=sky; ctx.fillRect(0,0,w,h);
  // stars
  for(let i=0;i<80;i++){
    ctx.fillStyle=`rgba(255,255,255,${0.3+Math.random()*0.7})`;
    ctx.beginPath(); ctx.arc(Math.random()*w,Math.random()*h*0.6,0.8,0,Math.PI*2); ctx.fill();
  }
  // moon
  ctx.fillStyle='#fffde7'; ctx.beginPath(); ctx.arc(w*0.15,h*0.12,w*0.05,0,Math.PI*2); ctx.fill();
  ctx.fillStyle='#1a1035'; ctx.beginPath(); ctx.arc(w*0.18,h*0.11,w*0.04,0,Math.PI*2); ctx.fill();
  // buildings
  const buildings=[
    [0,h*0.3,w*0.12,h*0.7,'#1a0a3a'],
    [w*0.1,h*0.15,w*0.1,h*0.85,'#0d0a2a'],
    [w*0.18,h*0.25,w*0.14,h*0.75,'#12082a'],
    [w*0.3,h*0.1,w*0.08,h*0.9,'#0a0825'],
    [w*0.36,h*0.2,w*0.12,h*0.8,'#150a30'],
    [w*0.46,h*0.05,w*0.1,h*0.95,'#0d0828'],
    [w*0.54,h*0.18,w*0.14,h*0.82,'#130930'],
    [w*0.66,h*0.12,w*0.1,h*0.88,'#0f0828'],
    [w*0.74,h*0.22,w*0.13,h*0.78,'#160a35'],
    [w*0.85,h*0.08,w*0.08,h*0.92,'#0a0722'],
    [w*0.91,h*0.3,w*0.12,h*0.7,'#1a0a3a'],
  ];
  buildings.forEach(([x,y,bw,bh,c])=>{
    ctx.fillStyle=c; ctx.fillRect(x,y,bw,bh);
    // windows
    const cols=Math.floor(bw/14), rows=Math.floor((h-y)/20);
    for(let r=0;r<rows;r++) for(let cc=0;cc<cols;cc++){
      if(Math.random()<0.55){
        const wx=c==='#0a0722'?'#ffd700':'#f59e0b';
        ctx.fillStyle=Math.random()<0.1?'#88aaff':wx;
        ctx.fillRect(x+6+cc*14,y+8+r*20,8,10);
      }
    }
  });
  // road
  const rg=ctx.createLinearGradient(0,h*0.88,0,h);
  rg.addColorStop(0,'#1a1a1a'); rg.addColorStop(1,'#0a0a0a');
  ctx.fillStyle=rg; ctx.fillRect(0,h*0.88,w,h*0.12);
  ctx.strokeStyle='rgba(255,200,0,0.4)'; ctx.lineWidth=3; ctx.setLineDash([30,20]);
  ctx.beginPath(); ctx.moveTo(0,h*0.935); ctx.lineTo(w,h*0.935); ctx.stroke();
  ctx.setLineDash([]);
  // reflections on road
  buildings.forEach(([x,y,bw,bh,c])=>{
    const rg2=ctx.createLinearGradient(0,h*0.88,0,h);
    rg2.addColorStop(0,'rgba(245,158,11,0.15)'); rg2.addColorStop(1,'rgba(245,158,11,0)');
    ctx.fillStyle=rg2; ctx.fillRect(x,h*0.88,bw,h*0.12);
  });
}

function drawVolcano(ctx, w, h) {
  const sky=ctx.createLinearGradient(0,0,0,h*0.6);
  sky.addColorStop(0,'#1a0a00'); sky.addColorStop(0.4,'#3d1000'); sky.addColorStop(1,'#6b1a00');
  ctx.fillStyle=sky; ctx.fillRect(0,0,w,h);
  // lava glow in sky
  const lg=ctx.createRadialGradient(w*0.5,h*0.45,10,w*0.5,h*0.45,w*0.4);
  lg.addColorStop(0,'rgba(255,80,0,0.3)'); lg.addColorStop(1,'rgba(255,0,0,0)');
  ctx.fillStyle=lg; ctx.fillRect(0,0,w,h);
  // ash clouds
  ctx.fillStyle='rgba(30,20,10,0.7)';
  [[w*0.4,h*0.08,80,40],[w*0.55,h*0.12,100,45],[w*0.35,h*0.15,70,35],[w*0.65,h*0.1,85,38]].forEach(([x,y,rx,ry])=>{
    ctx.beginPath(); ctx.ellipse(x,y,rx,ry,0,0,Math.PI*2); ctx.fill();
  });
  // volcano body
  ctx.fillStyle='#1a0800';
  ctx.beginPath(); ctx.moveTo(0,h); ctx.lineTo(w*0.25,h*0.45); ctx.lineTo(w*0.5,h*0.42); ctx.lineTo(w*0.75,h*0.45); ctx.lineTo(w,h); ctx.closePath(); ctx.fill();
  // lava inside crater
  const cg=ctx.createRadialGradient(w*0.5,h*0.45,2,w*0.5,h*0.45,w*0.06);
  cg.addColorStop(0,'#fff'); cg.addColorStop(0.2,'#ff9900'); cg.addColorStop(1,'#cc2200');
  ctx.fillStyle=cg; ctx.beginPath(); ctx.ellipse(w*0.5,h*0.455,w*0.06,h*0.025,0,0,Math.PI*2); ctx.fill();
  // lava flows
  function lavaFlow(startX,startY,endX,endY,width,alpha){
    const lg2=ctx.createLinearGradient(startX,startY,endX,endY);
    lg2.addColorStop(0,'rgba(255,150,0,'+alpha+')');
    lg2.addColorStop(0.5,'rgba(255,50,0,'+(alpha*0.8)+')');
    lg2.addColorStop(1,'rgba(100,0,0,0)');
    ctx.strokeStyle=lg2; ctx.lineWidth=width;
    ctx.beginPath(); ctx.moveTo(startX,startY);
    ctx.bezierCurveTo(startX+(endX-startX)*0.3+20,startY+(endY-startY)*0.3,startX+(endX-startX)*0.6-20,startY+(endY-startY)*0.6,endX,endY);
    ctx.stroke();
  }
  lavaFlow(w*0.5,h*0.47,w*0.35,h*0.75,18,0.9);
  lavaFlow(w*0.5,h*0.47,w*0.6,h*0.8,14,0.8);
  lavaFlow(w*0.5,h*0.47,w*0.45,h*0.9,10,0.7);
  // lava lake bottom
  const llg=ctx.createLinearGradient(0,h*0.82,0,h);
  llg.addColorStop(0,'#cc3300'); llg.addColorStop(0.3,'#ff6600'); llg.addColorStop(1,'#330000');
  ctx.fillStyle=llg; ctx.fillRect(0,h*0.85,w,h*0.15);
  // sparks
  for(let i=0;i<30;i++){
    ctx.fillStyle=`rgba(255,${150+Math.random()*100},0,${0.4+Math.random()*0.6})`;
    const sx=w*0.5+(Math.random()-0.5)*w*0.1, sy=h*0.42+Math.random()*h*0.3;
    ctx.beginPath(); ctx.arc(sx,sy,Math.random()*3+1,0,Math.PI*2); ctx.fill();
  }
}

function buildImage(key) {
  const c = document.getElementById('srcCanvas');
  c.width = BOARD_SIZE; c.height = BOARD_SIZE;
  DRAWS[key](c.getContext('2d'), BOARD_SIZE, BOARD_SIZE);
  return c;
}

function startPuzzle() {
  N = parseInt(document.getElementById('difficulty').value);
  const key = document.getElementById('imgSelect').value;
  const canvas = buildImage(key);
  const board = document.getElementById('board');
  board.innerHTML = '';
  board.style.width = BOARD_SIZE + 'px';
  board.style.height = BOARD_SIZE + 'px';
  document.getElementById('win-msg').style.display = 'none';
  pieces = []; moves = 0;
  document.getElementById('mv').textContent = 0;
  document.getElementById('total-count').textContent = N*N;
  document.getElementById('correct-count').textContent = 0;

  const ps = BOARD_SIZE / N;
  const positions = [];
  for(let r=0;r<N;r++) for(let c=0;c<N;c++) positions.push({r,c});
  shuffle(positions);

  positions.forEach(({r,c}, i) => {
    const el = document.createElement('canvas');
    el.width = ps; el.height = ps;
    el.className = 'piece';
    el.getContext('2d').drawImage(canvas, c*ps, r*ps, ps, ps, 0, 0, ps, ps);
    const col = i % N, row = Math.floor(i / N);
    el.style.left = col*ps + 'px';
    el.style.top = row*ps + 'px';
    el.style.width = ps + 'px';
    el.style.height = ps + 'px';
    el.dataset.targetR = r;
    el.dataset.targetC = c;
    el.dataset.curRow = row;
    el.dataset.curCol = col;
    board.appendChild(el);
    pieces.push(el);
    el.addEventListener('mousedown', onDown);
    el.addEventListener('touchstart', onTouchStart, {passive:false});
  });
}

function shuffle(a) { for(let i=a.length-1;i>0;i--){const j=Math.floor(Math.random()*(i+1));[a[i],a[j]]=[a[j],a[i]];} }

function onDown(e) { e.preventDefault(); startDrag(e.currentTarget, e.clientX, e.clientY); }
function onTouchStart(e) { e.preventDefault(); startDrag(e.currentTarget, e.touches[0].clientX, e.touches[0].clientY); }

function startDrag(el, cx, cy) {
  dragging = el;
  const r = el.getBoundingClientRect();
  offX = cx - r.left; offY = cy - r.top;
  el.classList.add('dragging');
}

document.addEventListener('mousemove', onMove);
document.addEventListener('touchmove', e => { if(dragging){e.preventDefault();onMove(e.touches[0]);} }, {passive:false});

function onMove(e) {
  if(!dragging) return;
  const br = document.getElementById('board').getBoundingClientRect();
  const ps = BOARD_SIZE / N;
  let x = Math.max(0, Math.min(BOARD_SIZE-ps, e.clientX - br.left - offX));
  let y = Math.max(0, Math.min(BOARD_SIZE-ps, e.clientY - br.top - offY));
  dragging.style.left = x + 'px';
  dragging.style.top = y + 'px';
}

document.addEventListener('mouseup', onUp);
document.addEventListener('touchend', onUp);

function onUp() {
  if(!dragging) return;
  const ps = BOARD_SIZE / N;
  const sc = Math.max(0,Math.min(N-1,Math.round(parseFloat(dragging.style.left)/ps)));
  const sr = Math.max(0,Math.min(N-1,Math.round(parseFloat(dragging.style.top)/ps)));
  const dc = parseInt(dragging.dataset.curCol), dr = parseInt(dragging.dataset.curRow);

  if(sc!==dc || sr!==dr) {
    moves++;
    document.getElementById('mv').textContent = moves;
    const other = pieces.find(p=>p!==dragging && parseInt(p.dataset.curRow)===sr && parseInt(p.dataset.curCol)===sc);
    if(other) {
      other.style.left = dc*ps+'px'; other.style.top = dr*ps+'px';
      other.dataset.curRow = dr; other.dataset.curCol = dc;
      checkCorrect(other);
    }
    dragging.style.left = sc*ps+'px'; dragging.style.top = sr*ps+'px';
    dragging.dataset.curRow = sr; dragging.dataset.curCol = sc;
  }
  dragging.classList.remove('dragging');
  checkCorrect(dragging);
  dragging = null;
  const done = pieces.filter(p=>p.classList.contains('correct')).length;
  document.getElementById('correct-count').textContent = done;
  if(done===N*N) {
    document.getElementById('win-msg').style.display='block';
    document.getElementById('final-mv').textContent=moves;
  }
}

function checkCorrect(el) {
  el.classList.toggle('correct', parseInt(el.dataset.curRow)===parseInt(el.dataset.targetR) && parseInt(el.dataset.curCol)===parseInt(el.dataset.targetC));
}

function showPreview() {
  const key = document.getElementById('imgSelect').value;
  const src = buildImage(key);
  const pc = document.getElementById('previewCanvas');
  pc.width = Math.min(500, window.innerWidth*0.85);
  pc.height = pc.width;
  pc.getContext('2d').drawImage(src, 0, 0, pc.width, pc.height);
  document.getElementById('preview-overlay').classList.add('active');
}
function hidePreview() { document.getElementById('preview-overlay').classList.remove('active'); }

startPuzzle();
</script>
</body>
